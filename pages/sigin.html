<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="./page css/sign in.css">
    <link rel="stylesheet" href="./page css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="../page js/sign in.js"></script>

</head>

<body>
    <header id="header">
        <div class="logo">☕ Brew Haven</div>
        <div class="menu-btn" id="menuBtn">☰</div>
        <nav>
            <ul id="navLinks">
                <li><a href="./index.html">Home</a></li>
                <li><a href=".././pages/menu.html">Menu</a></li>
                <li><a href=".././pages/order.html">Order</a></li>
                <li><a href=".././pages/login.html">Login</a></li>
                <li><a href=".././pages/about.html">About</a></li>
                <li><a href=".././pages/contact.html">Contact</a></li>

            </ul>
        </nav>
    </header>

    <div class="login-container">

        <h1>Brew Haven ☕</h1>
        <p>Welcome back! Please sign in.</p>

        <form>

            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label for="password">Password</label>

            <div class="password-container">
                <input type="password" id="password" class="input-password" placeholder="Enter your password">
                <span class="eye-icon" id="toggle">👁</span>
            </div>

            <div class="options">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">Sign In</button>

            <p class="signup-text">
                Don't have an account? <a href="#">Create Account</a>
            </p>

        </form>

    </div>
    <script>
        const toggle = document.getElementById("toggle");
const password = document.getElementById("password");

toggle.onclick = function () {
    if (password.type === "password") {
        password.type = "text";
        toggle.textContent = "👁‍🗨";
    } else {
        password.type = "password";
        toggle.textContent = "👁";
    }
};
    </script>
    <section class="cta">
        <h2>Visit Us Today & Enjoy the Perfect Cup</h2>
        <button class="btn" onclick="orderNow()">Order Now</button>
    </section>
     <footer>
        © 2026 Brew Haven Coffee | All Rights Reserved
    </footer>
</body>

</html>
